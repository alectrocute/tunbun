services:
  tunbun-client:
    image: alectrocute/tunbun:latest
    network_mode: host
    environment:
      TUNBUN_MODE: client
      TUNBUN_SERVER_ADDR: your-anycast-endpoint-ip-for-7000
      TUNBUN_SERVER_PORT: 7000
      TUNBUN_TOKEN: replace-with-random-secret
      TUNBUN_LOCAL_PORT_TO_FQDN: "8080:example1-abc123.b-cdn.net,8081:example2-abc123.b-cdn.net"
